<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KIA 타이거즈</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
:root{--red:#C8102E;--red2:rgba(200,16,46,.12);--bg:#0a0a0a;--card:#141414;--border:#242424;--text:#e8e8e8;--dim:#666;--dim2:#2a2a2a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#111;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
body{display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
.app{width:100%;max-width:420px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;margin:0 auto}
@media(min-width:480px){
 body{align-items:center;padding:20px 0;background:#060606}
 .app{max-width:390px;min-height:auto;height:840px;border-radius:40px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.9),0 0 0 1px #1a1a1a}
}
.hdr{background:var(--red);padding:12px 16px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-circle{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--red)}
.hdr-title{color:#fff;font-size:16px;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.65);font-size:10px;margin-top:1px}
.sync-btn{font-size:9px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px;cursor:pointer;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:20px}
.sync-btn i{font-size:13px}
.nav-wrap{display:flex;overflow-x:auto;scrollbar-width:none}
.nav-wrap::-webkit-scrollbar{display:none}
.nav-item{flex-shrink:0;padding:8px 12px;font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s}
.nav-item.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:none}
.body::-webkit-scrollbar{display:none}
.page{display:none}.page.on{display:block}
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#1a0808;border:.5px solid #3a1010;border-radius:10px;padding:14px;text-align:center;font-size:12px;color:#c87070;margin:10px 0;line-height:1.8}
.sec{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.8px;margin:12px 0 7px;display:flex;align-items:center;justify-content:space-between}
.sec-sm{font-size:9px;color:var(--red);font-weight:400;letter-spacing:0}
.card{background:var(--card);border-radius:12px;padding:8px 12px;margin-bottom:8px;border:.5px solid var(--border)}
.today-card{background:linear-gradient(135deg,#1e0a0f,#180508);border:.5px solid #3a1520;border-radius:12px;padding:12px 14px;margin-bottom:0}
.today-lbl{font-size:10px;color:var(--red);font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.stat-row{display:flex;gap:6px}
.stat-box{flex:1;background:var(--card);border-radius:10px;padding:9px 4px;border:.5px solid var(--border);text-align:center}
.sv{font-size:18px;font-weight:700;color:#fff}
.sv.r{color:var(--red)}
.sl{font-size:9px;color:var(--dim);margin-top:2px}
.st-wrap{overflow-x:auto;scrollbar-width:none}
.st-wrap::-webkit-scrollbar{display:none}
.st-tbl{min-width:440px;width:100%}
.st-hd,.st-row{display:flex;align-items:center;padding:4px 8px}
.st-hd{border-bottom:.5px solid var(--border)}
.st-hd span{font-size:9px;color:#3a3a3a;font-weight:600;text-align:center}
.st-row{border-bottom:.5px solid #111}
.st-row:last-child{border:none}
.st-row.kia{background:rgba(200,16,46,.07);border-left:2px solid var(--red)}
.cr{width:18px;flex-shrink:0;font-size:10px;text-align:center}
.ct{width:46px;flex-shrink:0;padding-left:4px;font-size:11px;font-weight:600;color:var(--text)}
.ct.kia{color:var(--red)}
.cn{flex:1;font-size:10px;color:#666;text-align:center}
.cn.b{color:#fff;font-weight:700;font-size:11px}
.cn.d{color:#2a2a2a}
.crec{width:36px;flex-shrink:0;font-size:9px;text-align:center}
.prev-wrap{background:var(--card);border-radius:12px;padding:10px 14px;border:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.game-row{display:flex;align-items:center;padding:7px 0;border-bottom:.5px solid #111;gap:7px}
.game-row:last-child{border:none}
.game-row.tr{background:rgba(200,16,46,.05);margin:0 -12px;padding:7px 12px}
.gd{font-size:10px;color:var(--dim);width:32px;text-align:center;flex-shrink:0;line-height:1.5}
.gdw{font-size:9px;color:#1e1e1e}
.gi{flex:1}
.gt{font-size:12px;color:#fff;font-weight:600}
.gs{font-size:10px;color:#2a2a2a;margin-top:1px}
.gr{text-align:right;flex-shrink:0;min-width:42px}
.rw{font-size:12px;font-weight:700;color:var(--red)}
.rl{font-size:12px;font-weight:700;color:#2a2a2a}
.rd{font-size:12px;font-weight:700;color:#555}
.rs{font-size:11px;color:#222}
.bw{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--red2);color:var(--red);display:block;margin-top:2px;text-align:center}
.bl{font-size:9px;padding:1px 5px;border-radius:3px;background:#141414;color:#2a2a2a;display:block;margin-top:2px;text-align:center}
.bd{font-size:9px;padding:1px 5px;border-radius:3px;background:#141414;color:#444;display:block;margin-top:2px;text-align:center}
.bc{font-size:9px;padding:1px 5px;border-radius:3px;background:#0a0a0a;color:#222;display:block;margin-top:2px;text-align:center}
.chip{font-size:9px;color:var(--red);font-weight:700;background:var(--red2);padding:1px 5px;border-radius:4px;margin-left:4px}
.mtabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.mtabs::-webkit-scrollbar{display:none}
.mtab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;border:.5px solid var(--border);color:var(--dim);cursor:pointer}
.mtab.on{background:var(--red);border-color:var(--red);color:#fff}
.mtab.past{border-color:#111;color:#1a1a1a}
.etabs{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}
.etabs::-webkit-scrollbar{display:none}
.etab{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:.5px solid var(--border);color:var(--dim);cursor:pointer;white-space:nowrap}
.etab.on{background:var(--red);border-color:var(--red);color:#fff}
.sbar{display:flex;gap:6px;margin-bottom:8px}
.sbtn{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:.5px solid var(--border);color:var(--dim);cursor:pointer}
.sbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.rswrap{display:flex;gap:6px;margin-bottom:8px}
.rsbox{flex:1;background:var(--card);border-radius:10px;padding:8px 4px;text-align:center;border:.5px solid var(--border)}
.rsv{font-size:15px;font-weight:700}
.rsl{font-size:9px;color:var(--dim);margin-top:2px}
.twrap{overflow-x:auto;scrollbar-width:none}
.twrap::-webkit-scrollbar{display:none}
.rtbl{width:100%;min-width:480px;border-collapse:collapse}
.rtbl th{font-size:9px;color:#3a3a3a;font-weight:600;padding:6px 7px;border-bottom:.5px solid var(--border);text-align:center;background:var(--bg);white-space:nowrap}
.rtbl td{font-size:11px;color:#aaa;padding:6px 7px;border-bottom:.5px solid #111;text-align:center;white-space:nowrap}
.rtbl td.tn{color:#fff;font-weight:600;text-align:left}
.rtbl tr:last-child td{border:none}
.ptag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.bnav{display:flex;background:#080808;border-top:.5px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));flex-shrink:0;align-items:center}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0}
.bn i{font-size:20px;color:#222}
.bn span{font-size:8px;color:#222;font-weight:600}
.bn.on i,.bn.on span{color:var(--red)}
.bdiv{width:.5px;height:34px;background:var(--border);flex-shrink:0}
.bext{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0}
.bext:active{opacity:.6}
.bext span{font-size:8px;color:#333;font-weight:600}
</style>
</head>
<body>
<div class="app">
 <div class="hdr">
  <div class="hdr-top">
   <div class="logo-wrap">
    <div class="logo-circle">KIA</div>
    <div>
     <div class="hdr-title">KIA 타이거즈</div>
     <div class="hdr-sub" id="updTxt">데이터 불러오는 중...</div>
    </div>
   </div>
   <div class="sync-btn" onclick="loadAll(true)">
    <i class="ti ti-refresh" id="syncIco"></i>새로고침
   </div>
  </div>
  <div class="nav-wrap">
   <div class="nav-item on" onclick="sw(0)">홈</div>
   <div class="nav-item" onclick="sw(1)">전체일정</div>
   <div class="nav-item" onclick="sw(2)">1군현황</div>
  </div>
 </div>

 <div class="body" id="mainBody">
  <div class="page on" id="p0"><div id="homeDiv"><div class="spinner"></div></div></div>
  <div class="page" id="p1"><div class="mtabs" id="mtabs"></div><div id="schedDiv"><div class="spinner"></div></div></div>
  <div class="page" id="p2"><div id="rosterDiv"><div class="spinner"></div></div></div>
 </div>

 <div class="bnav">
  <div class="bn on" onclick="sw(0)"><i class="ti ti-home"></i><span>홈</span></div>
  <div class="bn" onclick="sw(1)"><i class="ti ti-calendar"></i><span>전체일정</span></div>
  <div class="bn" onclick="sw(2)"><i class="ti ti-list-check"></i><span>1군현황</span></div>
  <div class="bdiv"></div>
  <div class="bext" onclick="window.open('https://www.youtube.com/@kiatigerstv','_blank')">
   <svg width="30" height="22" viewBox="0 0 60 44"><rect width="60" height="44" rx="6" fill="#888"/><polygon points="5,7 55,7 55,19 38,19 38,39 22,39 22,19 5,19" fill="#1a1a2e"/><polygon points="5,7 55,7 55,19 38,19 38,39 22,39 22,19 5,19" fill="none" stroke="#C8102E" stroke-width="2.5"/><polygon points="7,9 53,9 53,17 36,17 36,37 24,37 24,17 7,17" fill="#111"/></svg>
   <span>갸티비</span>
  </div>
  <div class="bext" onclick="window.open('https://tigers.co.kr','_blank')">
   <svg width="30" height="22" viewBox="0 0 60 44"><rect width="60" height="44" rx="6" fill="#fff"/><polygon points="4,6 56,6 56,18 39,18 39,40 21,40 21,18 4,18" fill="#1a1a2e"/><polygon points="7,9 53,9 53,15 36,15 36,37 24,37 24,15 7,15" fill="#C8102E"/><polygon points="24,15 36,15 36,37 24,37" fill="#e84060"/><polygon points="22,9 38,9 38,15 22,15" fill="#e84060"/></svg>
   <span>공식홈피</span>
  </div>
 </div>
</div>

<script>
// ── API 설정 ──────────────────────────────────────────
const BASE = 'https://tigers.co.kr/v1';
const PROXIES = [
  url => url,                                                          // 직접
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),          // corsproxy.io
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url), // allorigins
  url => 'https://thingproxy.freeboard.io/fetch/' + url,              // thingproxy
];

async function fetchAPI(path) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(BASE + path), { signal: AbortSignal.timeout(6000) });
      if (!res.ok) continue;
      const json = await res.json();
      return json;
    } catch(e) { continue; }
  }
  throw new Error('모든 프록시 실패: ' + path);
}

// ── 유틸 ─────────────────────────────────────────────
function fmtDate(d) {
  const s = String(d);
  return parseInt(s.slice(4,6)) + '/' + parseInt(s.slice(6,8));
}
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
}
function nowYM() {
  const n = new Date();
  return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}`;
}

// ── 전역 상태 ─────────────────────────────────────────
// API 실패 시 fallback (5/27 기준 실제 데이터)
const FALLBACK_ROSTER = [
  {name:'곽도규',pos:'투',back:'0', hit:'좌투좌타',birth:'2004.04.12',height:'185cm',weight:'90kg'},
  {name:'김규성',pos:'내',back:'14',hit:'우투좌타',birth:'1997.03.08',height:'185cm',weight:'88kg'},
  {name:'김도영',pos:'내',back:'5', hit:'우투우타',birth:'2003.10.02',height:'183cm',weight:'85kg'},
  {name:'김민규',pos:'외',back:'37',hit:'우투우타',birth:'2007.01.26',height:'180cm',weight:'73kg'},
  {name:'김범수',pos:'투',back:'49',hit:'좌투좌타',birth:'1995.10.03',height:'181cm',weight:'92kg'},
  {name:'김선빈',pos:'내',back:'3', hit:'우투우타',birth:'1989.12.18',height:'165cm',weight:'77kg'},
  {name:'김태군',pos:'포',back:'42',hit:'우투우타',birth:'1989.12.30',height:'182cm',weight:'92kg'},
  {name:'김호령',pos:'외',back:'27',hit:'우투우타',birth:'1992.04.30',height:'178cm',weight:'85kg'},
  {name:'나성범',pos:'외',back:'47',hit:'좌투좌타',birth:'1989.10.03',height:'183cm',weight:'100kg'},
  {name:'네일',  pos:'투',back:'40',hit:'우투우타',birth:'1993.02.08',height:'193cm',weight:'83kg'},
  {name:'박민',  pos:'내',back:'2', hit:'우투우타',birth:'2001.06.05',height:'184cm',weight:'84kg'},
  {name:'박재현',pos:'외',back:'15',hit:'우투좌타',birth:'2006.12.08',height:'180cm',weight:'73kg'},
  {name:'박정우',pos:'외',back:'1', hit:'좌투좌타',birth:'1998.02.01',height:'175cm',weight:'68kg'},
  {name:'성영탁',pos:'투',back:'65',hit:'우투우타',birth:'2004.07.28',height:'180cm',weight:'89kg'},
  {name:'아데를린',pos:'내',back:'24',hit:'우투우타',birth:'1991.11.18',height:'191cm',weight:'108kg'},
  {name:'양현종',pos:'투',back:'54',hit:'좌투좌타',birth:'1988.03.01',height:'183cm',weight:'91kg'},
  {name:'오선우',pos:'내',back:'56',hit:'좌투좌타',birth:'1996.12.13',height:'186cm',weight:'95kg'},
  {name:'올러',  pos:'투',back:'33',hit:'우투우타',birth:'1994.10.17',height:'193cm',weight:'102kg'},
  {name:'이의리',pos:'투',back:'48',hit:'좌투좌타',birth:'2002.06.16',height:'185cm',weight:'90kg'},
  {name:'이형범',pos:'투',back:'28',hit:'우투우타',birth:'1994.02.27',height:'181cm',weight:'80kg'},
  {name:'정해영',pos:'투',back:'62',hit:'우투우타',birth:'2001.08.23',height:'189cm',weight:'98kg'},
  {name:'정현창',pos:'내',back:'12',hit:'우투좌타',birth:'2006.07.14',height:'177cm',weight:'70kg'},
  {name:'조상우',pos:'투',back:'11',hit:'우투우타',birth:'1994.09.04',height:'186cm',weight:'97kg'},
  {name:'최지민',pos:'투',back:'39',hit:'좌투좌타',birth:'2003.09.10',height:'185cm',weight:'100kg'},
  {name:'한승연',pos:'외',back:'31',hit:'우투우타',birth:'2003.06.09',height:'183cm',weight:'92kg'},
  {name:'한재승',pos:'투',back:'55',hit:'우투우타',birth:'2001.11.21',height:'180cm',weight:'90kg'},
  {name:'한준수',pos:'포',back:'25',hit:'우투좌타',birth:'1999.02.13',height:'184cm',weight:'95kg'},
  {name:'홍민규',pos:'투',back:'67',hit:'우투좌타',birth:'2006.09.11',height:'183cm',weight:'87kg'},
  {name:'황동하',pos:'투',back:'41',hit:'우투우타',birth:'2002.07.30',height:'183cm',weight:'96kg'},
];

let G = { recent: null, sched: {}, roster: FALLBACK_ROSTER, rank: [], rankTitle: '', kia: null };
let curMonth = '5월';

// ── 경기행 렌더 ──────────────────────────────────────
function gameRow(g, markToday=true) {
  const td = todayStr();
  const isToday = String(g.displayDate) === td && markToday;
  const kiaHome = g.homeKey === 'HT';
  const kiaScore = kiaHome ? g.homeScore : g.visitScore;
  const oppScore = kiaHome ? g.visitScore : g.homeScore;
  const opp = kiaHome ? g.visit : g.home;
  const loc = kiaHome ? '홈' : '원정';
  const out = g.outcome || '';

  let sh = '', bh = '';
  if (out === '승') { sh = `<div class="rw">${kiaScore}-${oppScore}</div>`; bh = '<span class="bw">승</span>'; }
  else if (out === '패') { sh = `<div class="rl">${kiaScore}-${oppScore}</div>`; bh = '<span class="bl">패</span>'; }
  else if (out === '무') { sh = `<div class="rd">${kiaScore}-${oppScore}</div>`; bh = '<span class="bd">무</span>'; }
  else if (out === '취소') { sh = '<div class="rs">취소</div>'; bh = '<span class="bc">취소</span>'; }
  else { sh = `<div class="rs">${g.gtime || '예정'}</div>`; }

  const teams = kiaHome ? `KIA vs ${opp}` : `${opp} vs KIA`;
  return `<div class="game-row${isToday?' tr':''}">
   <div class="gd">${fmtDate(g.displayDate)}<div class="gdw">${g.gweek||''}</div></div>
   <div class="gi">
    <div class="gt">${teams}${isToday?'<span class="chip">오늘</span>':''}</div>
    <div class="gs">${g.stadium} · ${loc}${!out?' · '+g.gtime:''}</div>
   </div>
   <div class="gr">${sh}${bh}</div>
  </div>`;
}

// ── 홈 렌더 ──────────────────────────────────────────
function renderHome() {
  const r = G.recent;
  let html = '';

  // 오늘/현재 경기
  if (r?.current) {
    const c = r.current;
    const kiaHome = c.homeKey === 'HT';
    const opp = kiaHome ? c.visit : c.home;
    const badge = kiaHome
      ? '<div style="background:var(--red);color:#fff;font-size:10px;padding:5px 12px;border-radius:8px;font-weight:600;flex-shrink:0">홈</div>'
      : '<div style="background:#1a1a1a;color:#888;font-size:10px;padding:5px 12px;border-radius:8px;font-weight:600;flex-shrink:0">원정</div>';
    const sel = kiaHome
      ? `선발: ${c.homeStarter||'미정'} vs ${c.visitStarter||'미정'}`
      : `선발: ${c.visitStarter||'미정'} vs ${c.homeStarter||'미정'}`;
    html += `<div class="today-card" style="margin-top:2px">
     <div class="today-lbl"><div class="dot"></div>오늘 경기 · ${fmtDate(c.displayDate)} (${c.gweek})</div>
     <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
       <div style="font-size:17px;color:#fff;font-weight:700">KIA vs ${opp}</div>
       <div style="font-size:11px;color:var(--dim);margin-top:4px">${c.stadium} · ${c.gtime}</div>
       <div style="font-size:11px;color:var(--red);margin-top:3px">${sel}</div>
      </div>${badge}
     </div>
    </div>`;
  }

  // 누적 성적 (기아 API 순위 데이터 우선, 없으면 일정 데이터로 계산)
  let W, D, L, pct, kiaGC;
  if (G.kia) {
    // 기아 홈페이지 API에서 직접 가져온 실제 성적
    W = G.kia.win;
    D = G.kia.drawn;
    L = G.kia.lose;
    pct = parseFloat(G.kia.wra) || 0;
    kiaGC = (G.kia.gb === '0.0' || G.kia.gb === '-') ? '-' : G.kia.gb;
  } else {
    // fallback: 3/28 이후 일정 데이터 합산
    const all = Object.values(G.sched).flat().filter(g => {
      const d = String(g.displayDate || g.gameDate || '');
      return d >= '20260328'; // 개막일 이후만
    });
    const done = all.filter(g => ['승','패','무'].includes(g.outcome));
    W = done.filter(g => g.outcome==='승').length;
    D = done.filter(g => g.outcome==='무').length;
    L = done.filter(g => g.outcome==='패').length;
    pct = W+L > 0 ? W/(W+L) : 0;
    kiaGC = G.rank.find(r=>r.t==='KIA')?.gc || '-';
  }

  html += `<div class="sec">2026 시즌 누적 성적</div>
   <div class="stat-row">
    <div class="stat-box"><div class="sv r">${W}</div><div class="sl">승</div></div>
    <div class="stat-box"><div class="sv">${D}</div><div class="sl">무</div></div>
    <div class="stat-box"><div class="sv">${L}</div><div class="sl">패</div></div>
    <div class="stat-box"><div class="sv r">.${String(Math.round(pct*1000)).padStart(3,'0')}</div><div class="sl">승률</div></div>
    <div class="stat-box"><div class="sv" style="font-size:${String(kiaGC).length>3?14:18}px">${kiaGC}</div><div class="sl">게임차</div></div>
   </div>`;

  // KBO 순위
  html += `<div class="sec">🏆 KBO 리그 순위 <span class="sec-sm">${G.rankTitle||'KBO 공식'}</span></div>
   <div class="card" style="padding:6px 8px">
    <div class="st-wrap"><div class="st-tbl">
     <div class="st-hd">
      <span class="cr">#</span><span class="ct">팀</span>
      <span class="cn">경기</span><span class="cn">승</span><span class="cn">무</span><span class="cn">패</span>
      <span class="cn b">승률</span><span class="cn">게임차</span><span class="crec">최근</span>
     </div>`;
  if (G.rank.length > 0) {
    html += G.rank.map(s => `
     <div class="st-row${s.t==='KIA'?' kia':''}">
      <div class="cr" style="color:${s.r<=2?'#f5a623':'#3a3a3a'};font-weight:${s.r<=2?700:400}">${s.r}</div>
      <div class="ct${s.t==='KIA'?' kia':''}">${s.t}</div>
      <div class="cn d">${s.g}</div><div class="cn">${s.w}</div>
      <div class="cn d">${s.d}</div><div class="cn">${s.l}</div>
      <div class="cn b">.${String(Math.round(s.pct*1000)).padStart(3,'0')}</div>
      <div class="cn d">${s.gc}</div>
      <div class="crec" style="color:${s.rec&&s.rec.includes('승')?'#C8102E':'#444'}">${s.rec||'-'}</div>
     </div>`).join('');
  } else {
    html += '<div style="padding:12px;text-align:center;color:#333;font-size:11px">순위 데이터 로딩 중...</div>';
  }
  html += `</div></div></div>`;

  // 직전 경기
  if (r?.prev) {
    const p = r.prev;
    const kiaHome = p.homeKey === 'HT';
    const kiaScore = kiaHome ? p.homeScore : p.visitScore;
    const oppScore = kiaHome ? p.visitScore : p.homeScore;
    const opp = kiaHome ? p.visit : p.home;
    const loc = kiaHome ? '홈' : '원정';
    const pitcher = (kiaHome ? p.homeDecisionPitcher : p.visitDecisionPitcher) || '-';
    const badgeCls = p.outcome==='승'?'background:var(--red2);color:var(--red)':p.outcome==='패'?'background:#1a1a1a;color:#555':'background:#1a1a1a;color:#777';
    html += `<div class="sec">직전 경기</div>
     <div class="prev-wrap">
      <div>
       <div style="font-size:11px;color:var(--dim)">${fmtDate(p.displayDate)} (${p.gweek}) · ${p.stadium} · ${loc}</div>
       <div style="font-size:17px;color:#fff;font-weight:700;margin:3px 0">KIA <span style="color:${p.outcome==='승'?'var(--red)':'#2a2a2a'}">${kiaScore}</span> - <span style="color:${p.outcome==='패'?'#aaa':'#2a2a2a'}">${oppScore}</span> ${opp}</div>
       <div style="font-size:10px;color:#2a2a2a">${p.outcome==='승'?'승리':'패전'}투수: ${pitcher}</div>
      </div>
      <div style="font-size:12px;padding:5px 14px;border-radius:8px;font-weight:700;${badgeCls}">${p.outcome}</div>
     </div>`;
  }

  document.getElementById('homeDiv').innerHTML = html;
}

// ── 일정 렌더 ────────────────────────────────────────
function renderSched() {
  const months = Object.keys(G.sched);
  if (!months.length) return;
  const mm = parseInt(nowYM().slice(4));
  const curLbl = mm + '월';
  curMonth = months.includes(curLbl) ? curLbl : months[months.length-1];

  document.getElementById('mtabs').innerHTML = months.map(m => {
    const mn = parseInt(m);
    return `<div class="mtab${m===curMonth?' on':mn<mm?' past':''}" onclick="setMonth('${m}')">${m}</div>`;
  }).join('');
  setMonth(curMonth);
}

function setMonth(m) {
  curMonth = m;
  const mm = parseInt(nowYM().slice(4));
  document.querySelectorAll('.mtab').forEach(el => {
    const mn = parseInt(el.textContent);
    el.className = 'mtab' + (el.textContent===m?' on':mn<mm?' past':'');
  });
  const games = G.sched[m] || [];
  document.getElementById('schedDiv').innerHTML = games.length
    ? `<div class="card" style="padding:6px 10px">${games.map(g=>gameRow(g)).join('')}</div>`
    : `<div class="err">일정 없음</div>`;
}

// ── 1군 렌더 ─────────────────────────────────────────
const PC = {'투':'#4a9eff','내':'#2da87a','외':'#f5a623','포':'#c084fc'};
const PB = {'투':'rgba(74,158,255,.15)','내':'rgba(45,168,122,.15)','외':'rgba(245,166,35,.15)','포':'rgba(192,132,252,.15)'};
const PM = {'투수':'투','포수':'포','내야수':'내','외야수':'외','투':'투','포':'포','내':'내','외':'외'};



function renderRoster() {
  if (!G.roster.length) { document.getElementById('rosterDiv').innerHTML='<div class="err">엔트리 데이터 없음</div>'; return; }
  const sum = [
    {lbl:'전체',val:G.roster.length,c:'#C8102E'},
    {lbl:'투수',val:G.roster.filter(p=>p.pos==='투').length,c:'#4a9eff'},
    {lbl:'내야',val:G.roster.filter(p=>p.pos==='내').length,c:'#2da87a'},
    {lbl:'외야',val:G.roster.filter(p=>p.pos==='외').length,c:'#f5a623'},
    {lbl:'포수',val:G.roster.filter(p=>p.pos==='포').length,c:'#c084fc'},
  ].map(s=>`<div class="rsbox"><div class="rsv" style="color:${s.c}">${s.val}</div><div class="rsl">${s.lbl}</div></div>`).join('');

  document.getElementById('rosterDiv').innerHTML = `
   <div class="rswrap">${sum}</div>
   <div class="etabs">
    <div class="etab on" onclick="setEtab(0)">1군</div>
    <div class="etab" onclick="setEtab(1)">퓨처스</div>
    <div class="etab" onclick="setEtab(2)">육성/잔류</div>
    <div class="etab" onclick="setEtab(3)">등록/말소</div>
   </div>
   <div class="sbar">
    <div class="sbtn on" onclick="setSort('NAME')">이름순</div>
    <div class="sbtn" onclick="setSort('POS')">포지션순</div>
    <div class="sbtn" onclick="setSort('NUM')">등번호순</div>
   </div>
   <div class="twrap">
    <table class="rtbl">
     <thead><tr><th>No</th><th style="text-align:left">선수명</th><th>포지션</th><th>등번호</th><th>투타</th><th>생년월일</th><th>신장</th><th>체중</th></tr></thead>
     <tbody id="rbody"></tbody>
    </table>
   </div>`;
  setSort('NAME');
}

function setSort(key) {
  document.querySelectorAll('.sbtn').forEach((el,i)=>el.classList.toggle('on',['NAME','POS','NUM'][i]===key));
  let s = [...G.roster];
  if (key==='NAME') s.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if (key==='POS') s.sort((a,b)=>({'투':0,'내':1,'외':2,'포':3}[a.pos]||0)-({'투':0,'내':1,'외':2,'포':3}[b.pos]||0)||a.name.localeCompare(b.name,'ko'));
  else s.sort((a,b)=>parseInt(a.back)-parseInt(b.back));
  const tb = document.getElementById('rbody');
  if (tb) tb.innerHTML = s.map((p,i)=>`<tr>
   <td style="color:#333;font-size:10px">${i+1}</td>
   <td class="tn">${p.name}</td>
   <td><span class="ptag" style="color:${PC[p.pos]||'#888'};background:${PB[p.pos]||'rgba(255,255,255,.05)'}">${p.pos}</span></td>
   <td style="font-weight:700;color:#fff">${p.back}</td>
   <td style="color:#666">${p.hit}</td>
   <td style="color:#444">${p.birth}</td>
   <td style="color:#666">${p.height}</td>
   <td style="color:#666">${p.weight}</td>
  </tr>`).join('');
}
function setEtab(i){document.querySelectorAll('.etab').forEach((el,idx)=>el.classList.toggle('on',idx===i));}

// ── 메인 로딩 ────────────────────────────────────────
async function loadAll(manual=false) {
  const ico = document.getElementById('syncIco');
  ico.style.animation = 'spin .8s linear infinite';
  if (manual) {
    document.getElementById('homeDiv').innerHTML = '<div class="spinner"></div>';
    document.getElementById('schedDiv').innerHTML = '<div class="spinner"></div>';
    document.getElementById('rosterDiv').innerHTML = '<div class="spinner"></div>';
  }

  try {
    // 1. 최근경기
    const rec = await fetchAPI('/game/recentGames');
    G.recent = rec?.data || rec;

    // 2. 3~10월 일정 (병렬)
    const months = ['202603','202604','202605','202606','202607','202608','202609','202610'];
    const results = await Promise.allSettled(
      months.map(ym => fetchAPI(`/game/monthschedule?gameSearch.yearMonth=${ym}`))
    );
    G.sched = {};
    results.forEach((res, i) => {
      if (res.status === 'fulfilled') {
        const list = res.value?.data?.list || res.value?.list || [];
        const label = parseInt(months[i].slice(4)) + '월';
        if (list.length > 0) G.sched[label] = list;
      }
    });

    // 3. 1군 엔트리
    try {
      const ent = await fetchAPI('/game/entry/daily?gameSearch.entry=1&gameSearch.sortKey=NAME');
      // 응답 구조: {"data":{"playerList":[...]}} 또는 프록시 경유 시 다양한 형태
      let list = [];
      if (ent?.data?.playerList?.length > 0) list = ent.data.playerList;
      else if (ent?.data?.list?.length > 0) list = ent.data.list;
      else if (ent?.playerList?.length > 0) list = ent.playerList;
      else if (ent?.list?.length > 0) list = ent.list;
      else if (Array.isArray(ent?.data)) list = ent.data;
      else if (Array.isArray(ent)) list = ent;

      if (list.length > 0) {
        G.roster = list.map(p => ({
          name: p.playerName || p.name || '',
          pos: p.position2 || PM[p.positionName || ''] || '투',
          back: String(p.backnum || p.backNum || p.back || ''),
          hit: p.hittype || p.hitType || p.hit || '',
          birth: String(p.birth || p.birthDay || '').replace(/(\d{4})(\d{2})(\d{2})/, '$1.$2.$3'),
          height: p.height || '',
          weight: p.weight || '',
        })).filter(p => p.name);
        console.log('엔트리 API 로딩 성공:', G.roster.length, '명');
      } else {
        console.warn('엔트리 API 응답 비어있음 → fallback 사용');
        G.roster = FALLBACK_ROSTER;
      }
    } catch(e) {
      console.warn('엔트리 API 실패 → fallback 사용:', e.message);
      G.roster = FALLBACK_ROSTER;
    }

    // 4. 팀 순위 (기아 홈페이지 API - tigers.co.kr/v1/game/stats/teamrankbyyear)
    try {
      const rankRes = await fetchAPI('/game/stats/teamrankbyyear?gameSearch.gyear=2026');
      const rankList = rankRes?.data?.list || [];
      if (rankList.length > 0) {
        G.rank = rankList.map(t => ({
          r: t.rank,
          t: t.teamName,
          g: t.game,
          w: t.win,
          d: t.drawn,
          l: t.lose,
          pct: parseFloat(t.wra) || 0,
          gc: (t.gb === '0.0' || t.gb === '-') ? '-' : t.gb,
          rec: t.continue1 || '-',
        }));
        // KIA 데이터로 누적성적 업데이트
        const kiaData = rankList.find(t => t.teamCode === 'HT');
        if (kiaData) G.kia = kiaData;
        G.rankTitle = '기아 홈피 · 실시간';
      }
    } catch(e) { console.warn('팀순위 실패:', e); }

    // 렌더
    renderHome();
    renderSched();
    renderRoster();

    const n = new Date();
    document.getElementById('updTxt').textContent =
      `실시간 연동 · ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')} 업데이트`;

  } catch(e) {
    document.getElementById('homeDiv').innerHTML =
      `<div class="err">데이터를 불러오지 못했습니다.<br><small style="color:#a06060">${e.message}</small><br><br>
       <button onclick="loadAll(true)" style="padding:7px 18px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">다시 시도</button></div>`;
    document.getElementById('updTxt').textContent = '연결 오류';
  } finally {
    ico.style.animation = '';
  }
}

function sw(i) {
  document.querySelectorAll('.page').forEach((el,idx)=>el.classList.toggle('on',idx===i));
  document.querySelectorAll('.nav-item').forEach((el,idx)=>el.classList.toggle('on',idx===i));
  document.querySelectorAll('.bn').forEach((el,idx)=>{if(idx<3)el.classList.toggle('on',idx===i);});
  document.getElementById('mainBody').scrollTop = 0;
}

// 앱 열 때마다 자동 로딩
loadAll();
</script>
